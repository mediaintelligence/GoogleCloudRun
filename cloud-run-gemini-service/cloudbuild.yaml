steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:latest'
      - '-f'
      - 'cloud-run-gemini-service/Dockerfile'
      - 'cloud-run-gemini-service'
    id: 'build-image'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:$COMMIT_SHA'
    id: 'push-image-commit'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:latest'
    id: 'push-image-latest'
    waitFor: ['build-image']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gemini-orchestration-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest'
      - '--service-account'
      - 'gemini-service-account@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '100'
      - '--min-instances'
      - '1'
      - '--concurrency'
      - '100'
      - '--timeout'
      - '300s'
    id: 'deploy-cloud-run'
    waitFor: ['push-image-commit', 'push-image-latest']

  # Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Verifying deployment..."
        SERVICE_URL=$(gcloud run services describe gemini-orchestration-service \
          --region=${_REGION} \
          --platform=managed \
          --format='value(status.url)')
        
        echo "Service deployed at: $${SERVICE_URL}"
        
        # Test health endpoint
        curl -f "$${SERVICE_URL}/health" || exit 1
        
        echo "Health check passed!"
    id: 'verify-deployment'
    waitFor: ['deploy-cloud-run']

# Build configuration options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  
# Substitutions
substitutions:
  _REGION: us-central1

# Build timeout
timeout: '1200s'

# Build artifacts to be uploaded to Cloud Storage
images:
  - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/gemini-orchestration-service:latest'